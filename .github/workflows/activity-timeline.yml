name: Update Activity Timeline

on:
  workflow_dispatch:
  schedule:
    - cron: '0 * * * *'

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Essential for the bot to push changes
    steps:
      - uses: actions/checkout@v5

      - name: Fetch & Render Activity
        uses: FreddyMSchubert/github-activity-timeline@main
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          username: "jeyaprakashk"
          max_items: "15"
          # Simplified templates focused on repo names and counts
          event_templates: |
            {
              "push": "{{created_at}} — 🚀 Pushed {{payload.commits ? payload.commits.length : 1}} commit(s) to [{{repo}}]({{payload.compare}})",
              "issues_opened": "{{created_at}} — 🐛 Opened issue on {{repo}}",
              "issues_closed": "{{created_at}} — ✅ Closed issue on {{repo}}",
              "issue_commented": "{{created_at}} — 💬 Commented on {{repo}}",
              "pr_opened": "{{created_at}} — 🆕 Opened PR on {{repo}}",
              "pr_closed": "{{created_at}} — 🎯 Merged/Closed PR on {{repo}}",
              "release": "{{created_at}} — 📡 Released {{payload.release.tag_name}} on {{repo}}",
              "fork": "{{created_at}} — 🍴 Forked {{repo}}",
              "public": "{{created_at}} — 🎸 Made {{repo}} public"
            }

      - name: Commit & Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          # The next line prevents the "nothing to commit" error from failing the build
          git commit -m "chore: update activity timeline" || echo "No changes to commit"
          git push origin main
